[pytest]
# Pytest configuration for CHISEL

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.8

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, multiple modules)
    slow: Slow tests (>1 second)
    requires_spacy: Requires spaCy model
    requires_nltk: Requires NLTK data

# Coverage (if pytest-cov installed)
# [pytest-cov]
# --cov=chisel
# --cov-report=html
# --cov-report=term-missing
